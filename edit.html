<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기본 정보 수정 | 상인월드</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/mypage-common.css">
<link rel="stylesheet" href="css/edit.css">
</head>
<body class="mypage-edit-bg">
<header class="site-header">
  <div class="container">
    <a class="site-header__logo" href="./"><img src="image/logo.svg" alt="상인월드"></a>
    <nav class="site-header__nav">
      <a href="index.html#features">기능</a>
      <a href="index.html#pricing">요금안내</a>
      <a href="index.html#gallery">갤러리</a>
      <a href="index.html#notice">공지사항</a>
    </nav>
    <div class="site-header__actions">
      <a class="btn-header-outline" href="login/">로그인</a>
      <a class="btn-header-primary" href="signup/">무료로 시작하기</a>
    </div>
    <button class="hamburger" type="button" data-drawer-open aria-label="메뉴 열기" aria-expanded="false">
      <i data-lucide="menu" width="20" height="20"></i>
    </button>
  </div>
</header>

<div class="drawer-backdrop" data-drawer-backdrop></div>
<aside class="drawer" data-drawer>
  <div class="drawer__head">
    <button class="drawer__close" type="button" data-drawer-close aria-label="메뉴 닫기">
      <i data-lucide="x" width="32" height="32"></i>
    </button>
  </div>
  <nav class="drawer__nav">
    <a href="index.html#features">기능</a>
    <a href="index.html#pricing">요금안내</a>
    <a href="index.html#gallery">갤러리</a>
    <a href="index.html#notice">공지사항</a>
  </nav>
  <div class="drawer__actions">
    <a class="btn-header-outline" href="login/">로그인</a>
    <a class="btn-header-primary" href="signup/">무료로 시작하기</a>
  </div>
</aside>

<main class="mypage mypage-edit-main">
  <div class="mypage__inner mypage-edit-page">

    <div class="mypage-edit-overlay__head">
      <a href="mypage.html" class="mypage-edit-overlay__back">
        <i data-lucide="arrow-left" width="16" height="16"></i>마이페이지
      </a>
      <p class="mypage-edit-overlay__title">기본 정보 수정</p>
    </div>

    <div class="mypage-edit-avatar">
      <div class="mypage-avatar-wrap" data-mypage-avatar-wrap>
        <span class="mypage-hero__avatar" data-mypage-avatar-initial>준</span>
        <img class="mypage-hero__avatar-img" data-mypage-avatar-img alt="프로필 사진">
        <button class="mypage-avatar-edit" type="button" data-mypage-avatar-edit aria-haspopup="true" aria-expanded="false" aria-label="프로필 사진 변경">
          <i data-lucide="camera" width="14" height="14"></i>
        </button>
        <input type="file" accept="image/*" data-mypage-avatar-input hidden>
      </div>
    </div>

    <div class="mypage-edit-row">
      <div>
        <span class="mypage-form-field__label">이름</span>
        <p class="mypage-edit-row__value">준호</p>
      </div>
    </div>

    <div class="mypage-edit-row">
      <div>
        <span class="mypage-form-field__label">이메일</span>
        <p class="mypage-edit-row__value" data-mypage-edit-email-display>tktest03@gmail.com</p>
      </div>
      <button type="button" class="mypage-action" data-mypage-edit-email-open>변경하기</button>
    </div>

    <div class="mypage-edit-row">
      <div>
        <span class="mypage-form-field__label">비밀번호</span>
        <p class="mypage-edit-row__value">●●●●●●●●●●</p>
      </div>
      <button type="button" class="mypage-action" data-mypage-edit-password-open>변경하기</button>
    </div>

  </div>
</main>

<div class="mypage-mini-overlay" data-mypage-edit-email-overlay role="dialog" aria-modal="true" aria-labelledby="editEmailTitle">
  <div class="mypage-mini-overlay__modal">
    <span class="mypage-mini-overlay__handle"></span>
    <p class="mypage-edit-overlay__title" id="editEmailTitle">이메일 변경</p>
    <div class="mypage-edit-row">
      <div>
        <span class="mypage-form-field__label">현재 이메일</span>
        <p class="mypage-edit-row__value" data-mypage-edit-email-current>tktest03@gmail.com</p>
      </div>
    </div>
    <label class="mypage-form-field">
      <span class="mypage-form-field__label">새 이메일</span>
      <input type="email" class="mypage-form-input" data-mypage-edit-email-input placeholder="새 이메일">
      <p class="mypage-form-error" data-mypage-edit-email-error></p>
    </label>
    <div class="mypage-card-overlay__actions">
      <button type="button" class="mypage-btn-outline" data-mypage-edit-email-cancel>취소</button>
      <button type="button" class="mypage-btn-primary" data-mypage-edit-email-apply disabled>변경하기</button>
    </div>
  </div>
</div>

<div class="mypage-mini-overlay" data-mypage-edit-password-overlay role="dialog" aria-modal="true" aria-labelledby="editPwTitle">
  <div class="mypage-mini-overlay__modal">
    <span class="mypage-mini-overlay__handle"></span>
    <p class="mypage-edit-overlay__title" id="editPwTitle">비밀번호 변경</p>
    <label class="mypage-form-field">
      <span class="mypage-form-field__label">현재 비밀번호</span>
      <div class="mypage-form-password-wrap">
        <input type="password" class="mypage-form-input" placeholder="현재 비밀번호">
        <button type="button" class="mypage-form-password-toggle" data-mypage-password-toggle aria-label="비밀번호 표시">
          <i data-lucide="eye" width="16" height="16" data-mypage-eye-icon></i>
          <i data-lucide="eye-off" width="16" height="16" data-mypage-eye-off-icon></i>
        </button>
      </div>
    </label>
    <label class="mypage-form-field">
      <span class="mypage-form-field__label">새 비밀번호</span>
      <div class="mypage-form-password-wrap">
        <input type="password" class="mypage-form-input" placeholder="새 비밀번호" data-mypage-edit-password-new>
        <button type="button" class="mypage-form-password-toggle" data-mypage-password-toggle aria-label="비밀번호 표시">
          <i data-lucide="eye" width="16" height="16" data-mypage-eye-icon></i>
          <i data-lucide="eye-off" width="16" height="16" data-mypage-eye-off-icon></i>
        </button>
      </div>
    </label>
    <label class="mypage-form-field">
      <span class="mypage-form-field__label">새 비밀번호 확인</span>
      <div class="mypage-form-password-wrap">
        <input type="password" class="mypage-form-input" placeholder="새 비밀번호 확인" data-mypage-edit-password-confirm>
        <button type="button" class="mypage-form-password-toggle" data-mypage-password-toggle aria-label="비밀번호 표시">
          <i data-lucide="eye" width="16" height="16" data-mypage-eye-icon></i>
          <i data-lucide="eye-off" width="16" height="16" data-mypage-eye-off-icon></i>
        </button>
      </div>
    </label>

    <ul class="mypage-pw-rules">
      <li data-mypage-pw-rule="combo"><i data-lucide="check" width="14" height="14"></i>영문 + 숫자 + !@# 조합</li>
      <li data-mypage-pw-rule="length"><i data-lucide="check" width="14" height="14"></i>최소 8자 이상 입력해주세요.</li>
      <li data-mypage-pw-rule="match"><i data-lucide="check" width="14" height="14"></i>비밀번호 일치</li>
    </ul>

    <div class="mypage-card-overlay__actions">
      <button type="button" class="mypage-btn-outline" data-mypage-edit-password-cancel>취소</button>
      <button type="button" class="mypage-btn-primary" data-mypage-edit-password-apply disabled>변경하기</button>
    </div>
  </div>
</div>

<div class="mypage-avatar-overlay" data-mypage-avatar-menu role="dialog" aria-modal="true" aria-labelledby="editAvatarTitle">
  <div class="mypage-avatar-overlay__modal">
    <p class="mypage-avatar-overlay__title" id="editAvatarTitle">프로필 사진</p>
    <button type="button" class="mypage-avatar-overlay__option" data-mypage-avatar-change>
      <i data-lucide="image" width="18" height="18"></i>사진 변경
    </button>
    <button type="button" class="mypage-avatar-overlay__option" data-mypage-avatar-default>
      <i data-lucide="rotate-ccw" width="18" height="18"></i>기본 사진으로
    </button>
    <button type="button" class="mypage-btn-outline" data-mypage-avatar-menu-cancel>취소</button>
  </div>
</div>

<div class="mypage-crop-overlay" data-mypage-crop-overlay role="dialog" aria-modal="true" aria-labelledby="editCropTitle">
  <div class="mypage-crop-modal">
    <p class="mypage-crop-modal__title" id="editCropTitle">프로필 사진 편집</p>
    <p class="mypage-crop-modal__hint">권장 이미지 크기 256×256px 이상의 정사각형 사진을 사용하면 가장 선명하게 보여요.</p>
    <div class="mypage-crop-stage" data-mypage-crop-stage>
      <canvas data-mypage-crop-canvas width="280" height="280"></canvas>
    </div>
    <input type="range" class="mypage-crop-zoom" data-mypage-crop-zoom min="1" max="3" step="0.01" value="1" aria-label="확대/축소">
    <div class="mypage-crop-modal__actions">
      <button type="button" class="mypage-btn-outline" data-mypage-crop-cancel>취소</button>
      <button type="button" class="mypage-btn-primary" data-mypage-crop-apply>적용</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="js/common.js"></script>
<script src="js/mypage-common.js"></script>
<script src="js/edit.js"></script>
</body>
</html>
