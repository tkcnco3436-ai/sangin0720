<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>관리자 사이드바 | 상인월드</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/admin-dashboard.css">
</head>
<body class="admin-bg">

  <!-- ============ 관리자 사이드바 컴포넌트 ============ -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar__brand">
      <span class="admin-sidebar__title">상인월드 관리자</span>
    </div>

    <nav class="admin-nav" aria-label="관리자 메뉴">
      <a href="#" class="admin-nav__item is-active" data-admin-nav-item aria-current="page">
        <i data-lucide="bar-chart-3" width="18" height="18"></i><span class="admin-nav__label">통계·대시보드</span>
      </a>
      <a href="#" class="admin-nav__item" data-admin-nav-item>
        <i data-lucide="users" width="18" height="18"></i><span class="admin-nav__label">회원 관리</span>
      </a>
      <a href="#" class="admin-nav__item" data-admin-nav-item>
        <i data-lucide="credit-card" width="18" height="18"></i><span class="admin-nav__label">결제·크레딧</span>
        <i data-lucide="chevron-right" width="16" height="16" class="admin-nav__chevron"></i>
      </a>
      <a href="#" class="admin-nav__item" data-admin-nav-item>
        <i data-lucide="clapperboard" width="18" height="18"></i><span class="admin-nav__label">영상 관리</span>
        <i data-lucide="chevron-right" width="16" height="16" class="admin-nav__chevron"></i>
      </a>
      <a href="#" class="admin-nav__item" data-admin-nav-item>
        <i data-lucide="settings" width="18" height="18"></i><span class="admin-nav__label">시스템 관리</span>
        <i data-lucide="chevron-right" width="16" height="16" class="admin-nav__chevron"></i>
      </a>
      <a href="#" class="admin-nav__item" data-admin-nav-item>
        <i data-lucide="code-xml" width="18" height="18"></i><span class="admin-nav__label">개발사 관리</span>
        <i data-lucide="chevron-right" width="16" height="16" class="admin-nav__chevron"></i>
      </a>
      <a href="#" class="admin-nav__item" data-admin-nav-item>
        <i data-lucide="scroll-text" width="18" height="18"></i><span class="admin-nav__label">로그 관리</span>
        <i data-lucide="chevron-right" width="16" height="16" class="admin-nav__chevron"></i>
      </a>
    </nav>

    <div class="admin-sidebar__foot">
      <p class="admin-user">
        <span class="admin-user__name">슈퍼태경</span>
        <span class="admin-user__role">슈퍼어드민</span>
      </p>
      <button type="button" class="admin-logout">로그아웃</button>
    </div>
  </aside>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="js/admin-dashboard.js"></script>
</body>
</html>
